<!DOCTYPE html>
<html>
<head>
  <title>Code Access</title>
</head>
<body>
  <h1>Enter Access Code</h1>

  <input id="codeInput" placeholder="Enter code">
  <button onclick="redeemCode()">Submit</button>

  <p id="status"></p>

  <div id="protected" style="display:none;">
    <h2>Protected Content</h2>
    <p>You now have access.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
  const firebaseConfig = {
    apiKey: "AIzaSyBg9nC74B16acZNHLOZpNHwj2YPYDL2clU",
    authDomain: "sfc-early-access.firebaseapp.com",
    projectId: "sfc-early-access",
    storageBucket: "sfc-early-access.firebasestorage.app",
    messagingSenderId: "602773525803",
    appId: "1:602773525803:web:fc719630af298aeaa6a16e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const statusText = document.getElementById("status");
    const protectedDiv = document.getElementById("protected");

    async function login() {
      await signInAnonymously(auth);
    }

    async function checkSavedAccess() {
      if (localStorage.getItem("hasAccess") === "true") {
        protectedDiv.style.display = "block";
        statusText.innerText = "Access already granted.";
      }
    }

    window.redeemCode = async function() {
      const input = document.getElementById("codeInput").value.trim();

      if (!input) {
        statusText.innerText = "Enter a code.";
        return;
      }

      statusText.innerText = "Checking code...";

      const codesRef = collection(db, "codes");
      const snapshot = await getDocs(codesRef);

      let foundDoc = null;

      snapshot.forEach((d) => {
        const data = d.data();
        if (data.code === input) {
          foundDoc = { id: d.id, data };
        }
      });

      if (!foundDoc) {
        statusText.innerText = "Invalid code.";
        return;
      }

      if (foundDoc.data.used === true) {
        statusText.innerText = "Code already used.";
        return;
      }

      await updateDoc(doc(db, "codes", foundDoc.id), {
        used: true
      });

      localStorage.setItem("hasAccess", "true");

      statusText.innerText = "Code accepted! Access granted.";
      protectedDiv.style.display = "block";
    };

    await login();
    await checkSavedAccess();
  </script>
</body>
</html>
