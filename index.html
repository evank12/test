<!DOCTYPE html>
<html>
<head>
  <title>Code Access</title>
</head>
<body>
  <h1>Enter Access Code</h1>

  <input id="codeInput" placeholder="Enter code">
  <button id="btn">Submit</button>

  <p id="status"></p>

  <div id="protected" style="display:none;">
    <h2>Protected Content</h2>
    <p>You now have access.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
   const firebaseConfig = {
    apiKey: "AIzaSyBg9nC74B16acZNHLOZpNHwj2YPYDL2clU",
    authDomain: "sfc-early-access.firebaseapp.com",
    projectId: "sfc-early-access",
    storageBucket: "sfc-early-access.firebasestorage.app",
    messagingSenderId: "602773525803",
    appId: "1:602773525803:web:fc719630af298aeaa6a16e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const statusText = document.getElementById("status");
    const protectedDiv = document.getElementById("protected");
    const btn = document.getElementById("btn");

    async function login() {
      await signInAnonymously(auth);
    }

    function showProtected() {
      protectedDiv.style.display = "block";
    }

    async function checkSavedAccess() {
      if (localStorage.getItem("hasAccess") === "true") {
        statusText.innerText = "Access already granted.";
        showProtected();
      }
    }

    async function redeemCode() {
      const code = document.getElementById("codeInput").value.trim();

      if (!code) {
        statusText.innerText = "Enter a code.";
        return;
      }

      statusText.innerText = "Checking code...";

      const docRef = doc(db, "codes", code);
      const snap = await getDoc(docRef);

      if (!snap.exists()) {
        statusText.innerText = "Invalid code.";
        return;
      }

      const data = snap.data();

      if (data.used === true) {
        statusText.innerText = "Code already used.";
        return;
      }

      await updateDoc(docRef, { used: true });

      localStorage.setItem("hasAccess", "true");
      statusText.innerText = "Code accepted! Access granted.";
      showProtected();
    }

    btn.addEventListener("click", redeemCode);

    await login();
    await checkSavedAccess();
  </script>
</body>
</html>
