<!DOCTYPE html>
<html>
<head>
  <title>Code Access</title>
</head>
<body>
  <h1>Enter Access Code</h1>

  <input id="codeInput" placeholder="Enter code">
  <button id="btn">Submit</button>
  <button id="resetBtn">Reset Access DANGEROUS!!!!!!!!!</button>

  <p id="status"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBg9nC74B16acZNHLOZpNHwj2YPYDL2clU",
      authDomain: "sfc-early-access.firebaseapp.com",
      projectId: "sfc-early-access",
      storageBucket: "sfc-early-access.firebasestorage.app",
      messagingSenderId: "602773525803",
      appId: "1:602773525803:web:fc719630af298aeaa6a16e"
    };

const resetBtn = document.getElementById("resetBtn");
    
resetBtn.addEventListener("click", () => {
  localStorage.removeItem("hasAccess");
  localStorage.removeItem("redeemedCode");
  statusText.innerText = "Local access cleared. Enter a new code.";
});

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const statusText = document.getElementById("status");
    const btn = document.getElementById("btn");

    async function login() {
      await signInAnonymously(auth);
    }

async function hashCode(code) {
  const enc = new TextEncoder();
  const data = enc.encode(code);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function redeemCode() {
  const code = document.getElementById("codeInput").value.trim();

  if (!code) {
    statusText.innerText = "Enter a code.";
    return;
  }

  statusText.innerText = "Checking...";

  const hashed = await hashCode(code);

  const snapshot = await getDocs(collection(db, "codes"));

  let matchDoc = null;

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    if (data.hash === hashed) {
      matchDoc = { id: docSnap.id, data };
    }
  });

  if (!matchDoc) {
    statusText.innerText = "Invalid code.";
    return;
  }

  if (matchDoc.data.used) {
    statusText.innerText = "Code already used.";
    return;
  }

  await updateDoc(doc(db, "codes", matchDoc.id), {
    used: true
  });

  localStorage.setItem("hasAccess", "true");

  statusText.innerText = "Success! Redirecting...";

  setTimeout(() => {
    window.location.href = "fnafclicker.html";
  }, 800);
}

    btn.addEventListener("click", redeemCode);

    await login();

    if (localStorage.getItem("hasAccess") === "true") {
      window.location.href = "fnafclicker.html";
    }
  </script>
</body>
</html>
